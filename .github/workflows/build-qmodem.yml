name: Build Modem Feeds for armsr/armsrv8 (OpenWrt 24.10)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget python3
      
      - name: Download and extract OpenWrt SDK
        run: |
          # Ganti URL di bawah ini sesuai dengan path yang Anda temukan di browser
          wget -r -nd -l1 --no-parent -A 'openwrt-sdk-*.tar.zst' https://downloads.openwrt.org/releases/24.10.2/targets/armsr/armv8/
          
          tar -xf openwrt-sdk-*.tar.zst
          mv openwrt-sdk-*/ openwrt-sdk/

      - name: Add modem_feeds repository
        run: |
          cd openwrt-sdk
          echo "src-git modem_feeds https://github.com/x-shark/modem_feeds.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile Package
        run: |
          cd openwrt-sdk
          make defconfig
          make package/luci-app-qmodem/compile V=s -j$(nproc)
          make package/luci-app-qmodem-sms/compile V=s -j$(nproc)
          make package/luci-app-qmodem-mwan/compile V=s -j$(nproc)
          make package/luci-app-qmodem-ttl/compile V=s -j$(nproc)

      - name: Upload IPK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-modem-feeds-24.10
          path: openwrt-sdk/bin/packages/*/modem_feeds/*.ipk
