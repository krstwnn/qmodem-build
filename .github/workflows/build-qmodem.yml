name: Build QModem for armsr/armsrv8 (OpenWrt 24.10)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Menggunakan python3-setuptools sebagai pengganti distutils yang sudah usang di Ubuntu 24.04
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget python3

      - name: Download and extract OpenWrt SDK
        run: |
          # Ganti URL di bawah ini sesuai dengan path yang Anda temukan di browser
          wget -r -nd -l1 --no-parent -A 'openwrt-sdk-*.tar.zst' https://downloads.openwrt.org/releases/24.10.2/targets/armsr/armv8/
          
          tar -xf openwrt-sdk-*.tar.zst
          mv openwrt-sdk-*/ openwrt-sdk/

      - name: Add QModem source
        run: |
          cd openwrt-sdk
          # Kloning source code QModem langsung ke dalam folder package
          git clone https://github.com/feryw/QModem.git package/qmodem
          
          # Tetap perbarui feeds bawaan SDK agar dependensi antarmuka LuCI terpenuhi
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile Package
        run: |
          cd openwrt-sdk
          make defconfig
          
          # Mengompilasi paket QModem
          make package/qmodem/compile V=s

      - name: Upload IPK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-qmodem-24.10
          # Menggunakan wildcard yang lebih luas untuk menangkap file .ipk QModem di mana pun ia disimpan (biasanya di folder 'base' atau 'luci')
          path: openwrt-sdk/bin/packages/*/*/*.ipk
