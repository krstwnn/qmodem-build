name: Build QModem for OpenWrt 24.10.5 armsr/armv8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libncurses-dev libssl-dev python3-setuptools python3-dev rsync unzip zlib1g-dev file wget curl

      - name: Download and Extract OpenWrt SDK
        run: |
          PAGE_URL="https://downloads.openwrt.org/releases/24.10.5/targets/armsr/armv8/"
          SDK_FILE=$(curl -s $PAGE_URL | grep -oE 'openwrt-sdk-[a-zA-Z0-9._-]+-armsr-armv8_gcc-[a-zA-Z0-9._-]+\.Linux-x86_64\.tar\.xz' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "Error: File SDK tidak ditemukan di $PAGE_URL"
            exit 1
          fi
          
          echo "Mengunduh SDK: ${PAGE_URL}${SDK_FILE}"
          wget -O sdk.tar.xz "${PAGE_URL}${SDK_FILE}"
          
          mkdir sdk_dir
          tar -xf sdk.tar.xz -C sdk_dir --strip-components=1

      - name: Add QModem Feed
        working-directory: ./sdk_dir
        run: |
          echo 'src-git qmodem https://github.com/FUjr/QModem.git;main' >> feeds.conf.default
          ./scripts/feeds update qmodem
          ./scripts/feeds install -a -p qmodem

      - name: Compile QModem Packages
        working-directory: ./sdk_dir
        run: |
          make defconfig
          make package/luci-app-qmodem/compile V=s -j$(nproc)
          make package/luci-app-qmodem-sms/compile V=s -j$(nproc)
          make package/luci-app-qmodem-mwan/compile V=s -j$(nproc)
          make package/luci-app-qmodem-ttl/compile V=s -j$(nproc)

      - name: Upload IPK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QModem-OpenWrt-24.10.5-armsr-armv8
          path: ./sdk_dir/bin/packages/*/qmodem/*.ipk
