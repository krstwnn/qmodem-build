name: Build QModem for OpenWrt 23.05

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # python3-setuptools tetap digunakan agar tidak error di Ubuntu 24.04 (runner terbaru GitHub)
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget python3

      - name: Download and extract OpenWrt SDK 23.05
        run: |
          # Mengunduh SDK dari URL spesifik 23.05 armsr/armv8
          wget -r -nd -l1 --no-parent -A 'openwrt-sdk-*.tar.xz' https://downloads.openwrt.org/releases/23.05.5/targets/armsr/armv8/
          
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-*/ openwrt-sdk/

      - name: Clone QModem ke dalam Package SDK
        run: |
          cd openwrt-sdk
          # Ubah direktori tujuan menjadi huruf kecil (qmodem)
          git clone https://github.com/feryw/QModem.git package/qmodem

      - name: Update Feeds OpenWrt
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Konfigurasi dan Compile QModem
        run: |
          cd openwrt-sdk
          make defconfig
          
          # Compile inti qmodem beserta paket UI (LuCI)-nya
          make package/qmodem/compile V=s
          make package/luci-app-qmodem/compile V=s
          make package/luci-app-qmodem-sms/compile V=s

      - name: Siapkan File Output (.ipk)
        run: |
          mkdir -p output_ipk
          
          # Mencari dan menyalin HANYA paket-paket spesifik yang dibutuhkan QModem
          find openwrt-sdk/bin/ -type f \( \
            -iname "*qmodem*.ipk" -o \
            -iname "*ndisc6*.ipk" -o \
            -iname "*quectel-CM*.ipk" -o \
            -iname "*sms-forwarder*.ipk" -o \
            -iname "*sms-tool*.ipk" -o \
            -iname "*tom_modem*.ipk" -o \
            -iname "*ubus-at-daemon*.ipk" \
          \) -exec cp {} output_ipk/ \;

      - name: Upload Hasil Compile (.ipk)
        uses: actions/upload-artifact@v4
        with:
          name: QModem-Packages-aarch64
          path: output_ipk/
