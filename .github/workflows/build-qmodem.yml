name: Build QModem for OpenWrt 23.05

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # python3-setuptools tetap digunakan agar tidak error di Ubuntu 24.04 (runner terbaru GitHub)
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget python3

      - name: Download and extract OpenWrt SDK 23.05
        run: |
          # Mengunduh SDK dari URL spesifik 23.05.6 armsr/armv8
          wget -r -nd -l1 --no-parent -A 'openwrt-sdk-*.tar.xz' https://downloads.openwrt.org/releases/23.05.5/targets/armsr/armv8/
          
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-*/ openwrt-sdk/

    - name: Clone QModem ke dalam Package SDK
      run: |
        cd openwrt-sdk
        git clone https://github.com/feryw/QModem.git package/QModem

    - name: Update Feeds OpenWrt
      run: |
        cd openwrt-sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Konfigurasi dan Compile QModem
      run: |
        cd openwrt-sdk
        make defconfig
        # Mengompilasi paket QModem dan dependensinya
        make package/QModem/compile V=s

    - name: Upload Hasil Compile (.ipk)
      uses: actions/upload-artifact@v4
      with:
        name: QModem-Packages-aarch64
        # Mencari dan mengambil semua file .ipk yang berhasil dibuat
        path: openwrt-sdk/bin/packages/**/*.ipk
